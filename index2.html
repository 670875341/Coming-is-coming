<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action=manipulation">
    <title>现在吃什么 - 射门决定</title>
    <style>
        :root {
            --bg: #1a1a2e; --panel: #16213e; --accent: #e94560;
            --text: #eee; --btn-bg: #0f3460; --btn-active: #e94560;
        }
        body {
            margin: 0; overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #info-bar {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: rgba(22,33,62,0.85); backdrop-filter: blur(10px);
            color: var(--text); padding: 8px 24px; border-radius: 40px; font-size: 1rem;
            font-weight: 600; letter-spacing: 1px; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15);
        }
        #meal-badge { background: var(--accent); color: white; padding: 4px 14px; border-radius: 20px; font-size: 0.85rem; }
        #gold-display {
            background: rgba(255,215,0,0.2); color: #ffd700; padding: 4px 12px; border-radius: 20px;
            font-weight: bold; cursor: pointer; border: 1px solid #ffd700; font-size: 0.9rem;
        }
        #manual-select-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85rem;
        }
        #control-area {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 20; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        #shoot-btn {
            width: 100px; height: 100px; border-radius: 50%; background: var(--btn-bg);
            border: 4px solid rgba(255,255,255,0.5); color: white; font-size: 1.3rem;
            font-weight: bold; letter-spacing: 2px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            transition: all 0.1s; touch-action: none; position: relative;
        }
        #shoot-btn:active, #shoot-btn.pressing {
            background: var(--btn-active); border-color: #fff; transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(233,68,96,0.6);
        }
        #aim-indicator {
            color: white; font-size: 0.8rem; background: rgba(0,0,0,0.5); padding: 4px 12px;
            border-radius: 12px; min-width: 120px; text-align: center;
        }
        #result-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0);
            z-index: 100; background: rgba(22,33,62,0.95); backdrop-filter: blur(20px);
            border-radius: 24px; padding: 30px 35px; text-align: center; color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275); min-width: 250px;
        }
        #result-modal.show { transform: translate(-50%,-50%) scale(1); }
        #result-dish {
            font-size: 2.5rem; font-weight: bold; margin: 15px 0; color: #ffd700;
            text-shadow: 0 0 15px rgba(255,215,0,0.5);
        }
        #result-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        .result-btn { padding: 12px 24px; border-radius: 30px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .btn-confirm { background: #4caf50; color: white; }
        .btn-retry { background: #ff9800; color: white; }
        #settings-btn, #ai-btn {
            position: fixed; top: 15px; right: 15px; z-index: 20; width: 40px; height: 40px;
            border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.25); color: white; font-size: 1.3rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        #ai-btn { right: 65px; font-size: 1.5rem; }
        #settings-panel, #shop-panel, #ai-panel {
            position: fixed; top: 0; right: -340px; width: 320px; height: 100%;
            background: var(--panel); z-index: 200; transition: right 0.3s ease;
            padding: 20px; overflow-y: auto; color: white; box-shadow: -5px 0 20px rgba(0,0,0,0.6);
        }
        #settings-panel.open, #shop-panel.open, #ai-panel.open { right: 0; }
        .meal-section { margin-bottom: 20px; }
        .meal-title { font-weight: bold; margin-bottom: 5px; color: #ffd700; }
        .dish-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .dish-tag {
            background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 15px;
            font-size: 0.8rem; display: flex; align-items: center; gap: 5px;
        }
        .dish-tag .delete-dish { cursor: pointer; font-weight: bold; color: #ff5252; }
        .add-dish-row { display: flex; gap: 5px; margin-top: 5px; }
        .add-dish-row input {
            flex: 1; padding: 6px 10px; border-radius: 15px; border: none;
            background: rgba(255,255,255,0.15); color: white; outline: none;
        }
        .add-dish-row button {
            border-radius: 15px; border: none; background: var(--accent);
            color: white; padding: 6px 12px; cursor: pointer; font-weight: bold;
        }
        .shop-item, .ai-input-row {
            background: rgba(255,255,255,0.05); padding: 10px; margin: 8px 0;
            border-radius: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .ai-input-row label { min-width: 60px; font-size: 0.9rem; }
        .ai-input-row input, .ai-input-row select, .ai-input-row textarea {
            flex: 1; margin-left: 8px; padding: 6px; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.15); color: white; resize: vertical;
        }
        .ai-input-row select { cursor: pointer; }
        .shop-item button, #ai-submit-btn, #ai-check-btn {
            background: #ffd700; color: #000; border: none; padding: 6px 12px;
            border-radius: 15px; font-weight: bold; cursor: pointer;
        }
        #ai-check-btn { background: #4caf50; color: white; }
        #ai-response {
            background: rgba(255,255,255,0.1); padding: 12px; border-radius: 12px;
            margin-top: 15px; max-height: 300px; overflow-y: auto; white-space: pre-wrap;
            font-size: 0.9rem; line-height: 1.5;
        }
        #close-settings, #close-shop, #close-ai {
            float: right; background: none; border: none; color: white;
            font-size: 1.5rem; cursor: pointer;
        }
        #manual-dropdown {
            position: fixed; top: 65px; left: 50%; transform: translateX(-50%);
            z-index: 150; background: var(--panel); border-radius: 12px; padding: 10px;
            display: none; flex-direction: column; gap: 5px; max-height: 250px;
            overflow-y: auto; box-shadow: 0 8px 25px rgba(0,0,0,0.7);
        }
        #manual-dropdown.show { display: flex; }
        #manual-dropdown select {
            background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3);
            padding: 8px; border-radius: 8px; font-size: 1rem; outline: none;
        }
        #manual-dropdown button {
            background: var(--accent); color: white; border: none; padding: 8px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
<div id="canvas-container"></div>
<div id="info-bar">
    <span>⚽ 现在吃什么</span>
    <span id="meal-badge">--</span>
    <span id="time-display"></span>
    <span id="gold-display" title="点击打开商店">🪙 0</span>
    <button id="manual-select-btn">📋 手动选</button>
</div>
<div id="control-area">
    <div id="aim-indicator">按住滑动瞄准</div>
    <button id="shoot-btn">射 门</button>
</div>
<button id="settings-btn">☰</button>
<button id="ai-btn" title="AI推荐">🤖</button>

<div id="result-modal">
    <div style="font-size:1.2rem;">🎯 今天吃这个！</div>
    <div id="result-dish"></div>
    <div id="result-buttons">
        <button class="result-btn btn-confirm" id="btn-confirm">就吃这个！</button>
        <button class="result-btn btn-retry" id="btn-retry">再踢一脚</button>
    </div>
</div>

<div id="manual-dropdown">
    <select id="dish-select"></select>
    <button id="confirm-manual">✅ 就选这个</button>
</div>

<div id="settings-panel">
    <button id="close-settings">✕</button>
    <h3>📋 菜单管理</h3>
    <div id="settings-content"></div>
</div>

<div id="shop-panel">
    <button id="close-shop">✕</button>
    <h3>🛒 金币商店</h3>
    <div id="shop-content"></div>
</div>

<div id="ai-panel">
    <button id="close-ai">✕</button>
    <h3>🤖 AI 营养顾问</h3>
    <div class="ai-input-row">
        <label>选择模型</label>
        <select id="ai-model-select">
            <option value="deepseek">DeepSeek</option>
            <option value="kimi">Kimi (月之暗面)</option>
            <option value="doubao">豆包 (字节)</option>
        </select>
    </div>
    <div class="ai-input-row">
        <label>模型名</label>
        <input id="ai-model-name" value="deepseek-chat" placeholder="模型名称">
    </div>
    <div class="ai-input-row">
        <label>API Key</label>
        <input type="password" id="ai-api-key" placeholder="sk-...">
    </div>
    <button id="ai-check-btn">🔍 检查连接</button>
    <div class="ai-input-row">
        <label>心情</label>
        <input id="ai-mood" placeholder="开心/疲惫/焦虑...">
    </div>
    <div class="ai-input-row">
        <label>胃口</label>
        <input id="ai-appetite" placeholder="很好/一般/没胃口">
    </div>
    <div class="ai-input-row">
        <label>身高(cm)</label>
        <input type="number" id="ai-height" placeholder="170">
    </div>
    <div class="ai-input-row">
        <label>体重(kg)</label>
        <input type="number" id="ai-weight" placeholder="65">
    </div>
    <div class="ai-input-row">
        <label>特别想吃</label>
        <input id="ai-craving" placeholder="比如：辣的、带汤的">
    </div>
    <button id="ai-submit-btn">✨ 获取推荐</button>
    <div id="ai-response">等待输入...</div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.150.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// ==================== 数据管理 ====================
const DEFAULT_MENUS = {
    breakfast: ['包子','油条','豆浆','煎饼果子','牛奶麦片','三明治','鸡蛋饼','小米粥','馄饨','豆腐脑'],
    lunch: ['宫保鸡丁','鱼香肉丝','红烧牛肉面','蛋炒饭','麻辣香锅','寿司','披萨','汉堡','沙拉','鸡排饭','麻辣烫','黄焖鸡'],
    dinner: ['火锅','烤肉','牛排','意大利面','海鲜大餐','烤鱼','日式拉面','酸菜鱼','煲仔饭','水煮鱼','干锅','羊蝎子'],
    snack: ['烧烤','小龙虾','炸鸡','关东煮','炒粉','泡面','烤冷面','臭豆腐']
};

function loadMenus() {
    const saved = localStorage.getItem('nowEatMenus');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            for (const key of Object.keys(DEFAULT_MENUS)) if (!parsed[key]) parsed[key] = [...DEFAULT_MENUS[key]];
            return parsed;
        } catch(e) {}
    }
    return JSON.parse(JSON.stringify(DEFAULT_MENUS));
}
function saveMenus(menus) { localStorage.setItem('nowEatMenus', JSON.stringify(menus)); }
let menus = loadMenus();
saveMenus(menus);

let gameState = { gold:0, hitKeeper:0, audienceCount:0, skin:'default', scene:'default' };
const savedState = localStorage.getItem('nowEatState');
if (savedState) { try { Object.assign(gameState, JSON.parse(savedState)); } catch(e) {} }
function saveState() { localStorage.setItem('nowEatState', JSON.stringify(gameState)); }

// ==================== 时间与餐次 ====================
function getCurrentMealType() {
    const hour = new Date().getHours();
    if (hour>=6 && hour<10) return 'breakfast';
    if (hour>=10 && hour<15) return 'lunch';
    if (hour>=17 && hour<21) return 'dinner';
    return 'snack';
}
function getMealName(type) {
    const map = { breakfast:'早餐', lunch:'午餐', dinner:'晚餐', snack:'夜宵/下午茶' };
    return map[type] || '加餐';
}

// 语音播报
function speakDish(dishName, mealType) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(`今天${getMealName(mealType)}吃 ${dishName}`);
    utterance.lang = 'zh-CN'; utterance.rate = 1.0; utterance.pitch = 1.1;
    window.speechSynthesis.speak(utterance);
}

// ==================== 3D 场景 ====================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
const camera = new THREE.PerspectiveCamera(50, container.clientWidth/container.clientHeight, 0.5, 100);
camera.position.set(0,4.5,14); camera.lookAt(0,1.2,0);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff,0.6); scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff,0.9); sun.position.set(15,20,10); scene.add(sun);
const groundGeo = new THREE.PlaneGeometry(40,30);
const groundMat = new THREE.MeshStandardMaterial({color:0x4a8c3f, roughness:0.9});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2; ground.position.set(0,-0.01,-2); ground.receiveShadow = true; scene.add(ground);
function applyScene(type) {
    switch(type) {
        case 'star': scene.background = new THREE.Color(0x0a0a2e); ground.material.color.set(0x2a2a4e); break;
        case 'city': scene.background = new THREE.Color(0x1a1a2e); ground.material.color.set(0x3a3a5e); break;
        default: scene.background = new THREE.Color(0x87CEEB); ground.material.color.set(0x4a8c3f);
    }
}
applyScene(gameState.scene);
const goalGroup = new THREE.Group();
const frameMat = new THREE.MeshStandardMaterial({color:0xffffff});
['left','right'].forEach((side,i) => {
    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,2.5,8), frameMat);
    post.position.set(i===0?-2:2,1.25,-5); goalGroup.add(post);
});
const crossbar = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,4,8), frameMat);
crossbar.rotation.z = Math.PI/2; crossbar.position.set(0,2.5,-5); goalGroup.add(crossbar);
scene.add(goalGroup);

const goalkeeper = new THREE.Group();
goalkeeper.add(new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.35,1.2,8), new THREE.MeshStandardMaterial({color:0xffaa00}))).position.y=0.6;
goalkeeper.add(new THREE.Mesh(new THREE.SphereGeometry(0.28,16,16), new THREE.MeshStandardMaterial({color:0xffcc88}))).position.y=1.3;
goalkeeper.position.set(0,0,-5); scene.add(goalkeeper);
const goalBaseZ = -5, goalWidth = 4, goalHeight = 2.5, keeperReach = 0.7;

const playerGroup = new THREE.Group();
playerGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.3,1.1,8), new THREE.MeshStandardMaterial({color:0x2244aa}))).position.y=0.55;
playerGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.26,16,16), new THREE.MeshStandardMaterial({color:0xffcc88}))).position.y=1.2;
playerGroup.position.set(0,0,3.5); scene.add(playerGroup);

const ballGroup = new THREE.Group(); let ballMesh;
const BALL_FACES = 20; const ballRadius = 0.9;
let faceMaterials = [], faceMenus = [];
function createDishTexture(text) {
    const canvas = document.createElement('canvas'); canvas.width=128; canvas.height=128;
    const ctx = canvas.getContext('2d');
    ctx.beginPath(); ctx.arc(64,64,60,0,Math.PI*2); ctx.fillStyle='#1a1a2e'; ctx.fill();
    ctx.strokeStyle='#e94560'; ctx.lineWidth=3; ctx.stroke();
    ctx.fillStyle='white'; ctx.font='bold 22px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(text,64,64);
    return new THREE.CanvasTexture(canvas);
}
function buildBallGeometry() {
    const geo = new THREE.IcosahedronGeometry(ballRadius,0); geo.clearGroups();
    for (let i=0; i<20; i++) geo.addGroup(i*3,3,i);
    return geo;
}
function applySkin(skin) {
    if (!ballMesh) return;
    const colors = { default:0xffffff, gold:0xffd700, blue:0x4488ff };
    ballMesh.material.forEach((mat,i) => {
        if (skin==='rainbow') mat.color.setHSL(i/20,0.8,0.6);
        else mat.color.set(colors[skin]||0xffffff);
    });
}
function updateBallTextures(dishes) {
    faceMenus=[]; faceMaterials=[];
    for (let i=0; i<20; i++) {
        const d = dishes[i%dishes.length]||'?';
        faceMenus.push(d);
        faceMaterials.push(new THREE.MeshStandardMaterial({map:createDishTexture(d), roughness:0.3}));
    }
    if (ballMesh) { ballGroup.remove(ballMesh); ballMesh.material.forEach(m=>m.map?.dispose()); ballMesh.geometry.dispose(); }
    ballMesh = new THREE.Mesh(buildBallGeometry(), faceMaterials);
    ballMesh.castShadow = true; ballGroup.add(ballMesh);
    ballGroup.position.set(0,ballRadius,3.5);
    applySkin(gameState.skin);
}
let currentMeal = getCurrentMealType();
let currentDishes = [...menus[currentMeal]];
if (currentDishes.length===0) currentDishes=['随便吃'];
updateBallTextures(currentDishes);
scene.add(ballGroup);

const aimLineGroup = new THREE.Group();
aimLineGroup.add(new THREE.Mesh(new THREE.ConeGeometry(0.15,0.5,6), new THREE.MeshBasicMaterial({color:0xff4444}))).position.z=-0.5;
aimLineGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,2,6), new THREE.MeshBasicMaterial({color:0xff4444}))).position.z=-1;
aimLineGroup.visible = false; scene.add(aimLineGroup);

const audienceGroup = new THREE.Group(); scene.add(audienceGroup);
function createAudienceMember(idx) {
    const g = new THREE.Group();
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.2,0.8,6), new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(Math.random(),0.7,0.5)}))).position.y=0.4;
    g.add(new THREE.Mesh(new THREE.SphereGeometry(0.18,8,8), new THREE.MeshStandardMaterial({color:0xffcc88}))).position.y=0.9;
    const row = Math.floor(idx/5), col = idx%5;
    g.position.set(4.5+col*1.2, 0, -3-row*1.5);
    return g;
}
function updateAudience() {
    while(audienceGroup.children.length < gameState.audienceCount) audienceGroup.add(createAudienceMember(audienceGroup.children.length));
    while(audienceGroup.children.length > gameState.audienceCount) audienceGroup.remove(audienceGroup.children[audienceGroup.children.length-1]);
}
updateAudience();

// ==================== 游戏逻辑 ====================
let isAiming=false, aimStartX=0, aimCurrentX=0, shootAngle=0, shootPower=0.5;
let isAnimating=false, keeperTimer=0, keeperTargetX=0, keeperReactionTimer=0, shotTargetX=0;
function resetBall() { ballGroup.position.set(0,ballRadius,3.5); ballGroup.rotation.set(0,0,0); if(ballMesh) ballMesh.rotation.set(0,0,0); }
function showResult(dishName) {
    document.getElementById('result-dish').textContent = dishName;
    document.getElementById('result-modal').classList.add('show');
    speakDish(dishName, currentMeal);
}
function hideResult() { document.getElementById('result-modal').classList.remove('show'); }
document.getElementById('btn-confirm').addEventListener('click', ()=>{ hideResult(); resetBall(); });
document.getElementById('btn-retry').addEventListener('click', ()=>{ hideResult(); resetBall(); isAnimating=false; });

function getFacingDish() {
    const camPos = camera.position.clone();
    const dir = camPos.sub(ballGroup.position.clone()).normalize();
    if(!ballMesh) return currentDishes[0];
    const geo = ballMesh.geometry, pos = geo.attributes.position, idx = geo.index;
    let bestDot=-1, bestIdx=0;
    const mat3 = new THREE.Matrix3().getNormalMatrix(ballGroup.matrixWorld);
    for(let i=0; i<geo.groups.length; i++) {
        const g = geo.groups[i];
        const v0 = new THREE.Vector3(pos.getX(idx.getX(g.start)), pos.getY(idx.getX(g.start)), pos.getZ(idx.getX(g.start)));
        const v1 = new THREE.Vector3(pos.getX(idx.getX(g.start+1)), pos.getY(idx.getX(g.start+1)), pos.getZ(idx.getX(g.start+1)));
        const v2 = new THREE.Vector3(pos.getX(idx.getX(g.start+2)), pos.getY(idx.getX(g.start+2)), pos.getZ(idx.getX(g.start+2)));
        const n = new THREE.Vector3().crossVectors(v1.clone().sub(v0), v2.clone().sub(v0)).normalize().applyMatrix3(mat3).normalize();
        const d = n.dot(dir);
        if(d>bestDot) { bestDot=d; bestIdx=i; }
    }
    return faceMenus[bestIdx] || currentDishes[0];
}

function seededSpin(seed, cb) {
    const rng = mulberry32(seed);
    const dur = 0.8+rng()*0.5, axis = new THREE.Vector3(rng()-0.5,rng()-0.5,rng()-0.5).normalize(), speed = 8+rng()*12;
    const start = performance.now();
    function spin(now) {
        const t = (now-start)/1000;
        if(t>=dur) { ballMesh.rotateOnWorldAxis(axis, speed*(dur-t+0.016)); cb(); return; }
        ballMesh.rotateOnWorldAxis(axis, speed*0.016);
        requestAnimationFrame(spin);
    }
    requestAnimationFrame(spin);
}
function mulberry32(a) {
    return function() {
        a|=0; a=a+0x6D2B79F5|0;
        let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t;
        return ((t^t>>>14)>>>0)/4294967296;
    };
}

function startShotAnimation(targetX, power) {
    isAnimating=true; hideResult();
    const startPos = ballGroup.position.clone();
    const endPos = new THREE.Vector3(targetX, 0.3+power*1.2, goalBaseZ+0.3);
    const dur = 0.7+power*0.3, startT = performance.now();
    keeperReactionTimer = 0.8; shotTargetX = targetX;
    function anim(now) {
        const el = (now-startT)/1000;
        if(el>=dur) {
            ballGroup.position.copy(endPos);
            const inX = Math.abs(endPos.x) < goalWidth/2+0.4;
            const inY = endPos.y < goalHeight+0.3 && endPos.y > -0.2;
            const saved = inX && inY && Math.hypot(endPos.x-goalkeeper.position.x, endPos.y-0.8) < keeperReach;
            if(inX && inY && !saved) {
                const finalZ = goalBaseZ-0.6;
                const extraStart = performance.now();
                function moveIn(now2) {
                    const t = Math.min((now2-extraStart)/300,1);
                    ballGroup.position.lerpVectors(endPos, new THREE.Vector3(targetX, 0.3+power*1.2, finalZ), t);
                    if(t<1) requestAnimationFrame(moveIn);
                    else {
                        const seed = Math.floor(shootAngle*1000) + Math.floor(shootPower*10000);
                        seededSpin(seed, ()=>{
                            const dish = getFacingDish();
                            showResult(dish);
                            isAnimating=false;
                        });
                    }
                }
                requestAnimationFrame(moveIn);
            } else {
                if(saved) {
                    gameState.gold += 10;
                    gameState.hitKeeper++;
                    if(gameState.hitKeeper%10===0) { gameState.audienceCount++; updateAudience(); }
                    saveState(); updateGoldDisplay();
                }
                const bounceDir = saved ? new THREE.Vector3(endPos.x-goalkeeper.position.x,0.5,1.5).normalize()
                                        : new THREE.Vector3(endPos.x>0?1:-1,0.3,1).normalize();
                const bounceEnd = endPos.clone().add(bounceDir.multiplyScalar(2));
                const bounceStart = performance.now();
                function bounce(now2) {
                    const t = Math.min((now2-bounceStart)/400,1);
                    ballGroup.position.lerpVectors(endPos, bounceEnd, t);
                    if(t<1) requestAnimationFrame(bounce);
                    else setTimeout(()=>{ resetBall(); isAnimating=false; }, 300);
                }
                requestAnimationFrame(bounce);
            }
            return;
        }
        ballGroup.position.lerpVectors(startPos, endPos, el/dur);
        requestAnimationFrame(anim);
    }
    requestAnimationFrame(anim);
}

const shootBtn = document.getElementById('shoot-btn');
const aimInd = document.getElementById('aim-indicator');
function updateAim() {
    if(!isAiming) return;
    const dx = aimCurrentX - aimStartX;
    const clamped = Math.max(-120, Math.min(120, dx));
    shootAngle = (clamped/120)*25;
    shootPower = 0.35 + (Math.abs(clamped)/120)*0.65;
    aimInd.textContent = `角度:${shootAngle.toFixed(1)}° 力度:${(shootPower*100).toFixed(0)}%`;
    aimLineGroup.position.copy(ballGroup.position);
    aimLineGroup.rotation.set(0,0,0); aimLineGroup.rotateY(THREE.MathUtils.degToRad(-shootAngle));
    aimLineGroup.visible = true;
}
function onDown(e) {
    if(isAnimating) return; e.preventDefault();
    isAiming=true; shootBtn.classList.add('pressing');
    aimStartX = e.clientX||(e.touches&&e.touches[0].clientX);
    aimCurrentX = aimStartX; updateAim();
}
function onMove(e) {
    if(!isAiming) return; e.preventDefault();
    aimCurrentX = e.clientX||(e.touches&&e.touches[0].clientX)||aimCurrentX; updateAim();
}
function onUp(e) {
    if(!isAiming) return; e.preventDefault();
    isAiming=false; shootBtn.classList.remove('pressing'); aimLineGroup.visible=false;
    if(isAnimating) return;
    const rad = THREE.MathUtils.degToRad(shootAngle);
    const dist = Math.abs(ballGroup.position.z - goalBaseZ);
    const tx = Math.tan(rad)*dist;
    startShotAnimation(Math.max(-goalWidth/2+0.3, Math.min(goalWidth/2-0.3, tx)), shootPower);
    aimInd.textContent = '射门！';
}
shootBtn.addEventListener('pointerdown', onDown);
shootBtn.addEventListener('pointermove', onMove);
shootBtn.addEventListener('pointerup', onUp);
shootBtn.addEventListener('pointerleave', e=>{ if(isAiming) onUp(e); });
shootBtn.addEventListener('pointercancel', e=>{ if(isAiming) onUp(e); });
shootBtn.addEventListener('touchstart', e=>e.preventDefault());
shootBtn.addEventListener('touchmove', e=>e.preventDefault());
shootBtn.addEventListener('touchend', e=>e.preventDefault());

function updateKeeper(dt) {
    if(isAnimating && keeperReactionTimer>0) {
        keeperReactionTimer-=dt;
        if(keeperReactionTimer<=0) keeperTargetX = shotTargetX;
    }
    if(isAnimating && keeperReactionTimer<=0) {
        const dx = keeperTargetX - goalkeeper.position.x;
        goalkeeper.position.x += Math.sign(dx)*Math.min(Math.abs(dx), 2.2*dt);
    } else if(!isAnimating) {
        keeperTimer += dt;
        goalkeeper.position.x = Math.sin(keeperTimer*1.2)*1.8;
    }
    goalkeeper.position.x = Math.max(-goalWidth/2+0.3, Math.min(goalWidth/2-0.3, goalkeeper.position.x));
}

// 设置面板
function renderSettings() {
    const cont = document.getElementById('settings-content'); cont.innerHTML = '';
    [['breakfast','早餐'],['lunch','午餐'],['dinner','晚餐'],['snack','夜宵/下午茶']].forEach(([type,name])=>{
        const sec = document.createElement('div'); sec.className='meal-section';
        sec.innerHTML = `<div class="meal-title">${name}</div>`;
        const list = document.createElement('div'); list.className='dish-list';
        menus[type].forEach((d,i)=>{
            const tag = document.createElement('span'); tag.className='dish-tag';
            tag.innerHTML = `${d} <span class="delete-dish" data-meal="${type}" data-index="${i}">✕</span>`;
            list.appendChild(tag);
        });
        sec.appendChild(list);
        const row = document.createElement('div'); row.className='add-dish-row';
        row.innerHTML = `<input placeholder="新菜名" id="input-${type}"><button id="add-${type}">+</button>`;
        sec.appendChild(row); cont.appendChild(sec);
    });
    document.querySelectorAll('.delete-dish').forEach(b=>{
        b.addEventListener('click', e=>{
            const meal=e.target.dataset.meal, idx=parseInt(e.target.dataset.index);
            menus[meal].splice(idx,1); if(menus[meal].length===0) menus[meal]=['随便吃'];
            saveMenus(menus); renderSettings();
            if(meal===currentMeal){ currentDishes=[...menus[currentMeal]]; updateBallTextures(currentDishes); resetBall(); }
        });
    });
    ['breakfast','lunch','dinner','snack'].forEach(type=>{
        document.getElementById(`add-${type}`).addEventListener('click', ()=>{
            const val = document.getElementById(`input-${type}`).value.trim();
            if(val){ menus[type].push(val); saveMenus(menus); renderSettings(); document.getElementById(`input-${type}`).value='';
                if(type===currentMeal){ currentDishes=[...menus[currentMeal]]; updateBallTextures(currentDishes); resetBall(); } }
        });
    });
}
document.getElementById('settings-btn').addEventListener('click', ()=>{ document.getElementById('settings-panel').classList.add('open'); renderSettings(); });
document.getElementById('close-settings').addEventListener('click', ()=> document.getElementById('settings-panel').classList.remove('open'));

// 商店
const shopItems = [
    { name:'金色足球', key:'gold', price:50, type:'skin' },
    { name:'蓝色足球', key:'blue', price:30, type:'skin' },
    { name:'彩虹足球', key:'rainbow', price:80, type:'skin' },
    { name:'星空场景', key:'star', price:100, type:'scene' },
    { name:'城市夜景', key:'city', price:100, type:'scene' },
];
function renderShop() {
    const cont = document.getElementById('shop-content'); cont.innerHTML = '';
    shopItems.forEach(item=>{
        const div=document.createElement('div'); div.className='shop-item';
        const owned = (item.type==='skin'?gameState.skin:gameState.scene)===item.key;
        const btn=document.createElement('button');
        btn.textContent = owned?'使用中':`${item.price}💰`;
        btn.disabled = owned || gameState.gold<item.price;
        btn.addEventListener('click', ()=>{
            if(gameState.gold>=item.price && !owned) {
                gameState.gold-=item.price;
                if(item.type==='skin'){ gameState.skin=item.key; applySkin(item.key); }
                else { gameState.scene=item.key; applyScene(item.key); }
                saveState(); updateGoldDisplay(); renderShop();
            }
        });
        div.innerHTML=`<span>${item.name}</span>`; div.appendChild(btn); cont.appendChild(div);
    });
    const resetDiv=document.createElement('div'); resetDiv.className='shop-item';
    resetDiv.innerHTML='<span>恢复默认</span>';
    const rstBtn=document.createElement('button'); rstBtn.textContent='免费';
    rstBtn.addEventListener('click', ()=>{
        gameState.skin='default'; gameState.scene='default'; applySkin('default'); applyScene('default'); saveState(); renderShop();
    });
    resetDiv.appendChild(rstBtn); cont.appendChild(resetDiv);
}

// ==================== AI 面板 (多模型) ====================
const modelConfigs = {
    deepseek: { base: 'https://api.deepseek.com/v1', defaultModel: 'deepseek-chat' },
    kimi: { base: 'https://api.moonshot.cn/v1', defaultModel: 'moonshot-v1-8k' },
    doubao: { base: 'https://ark.cn-beijing.volces.com/api/v3', defaultModel: 'doubao-lite-128k' }
};

const aiModelSelect = document.getElementById('ai-model-select');
const aiModelName = document.getElementById('ai-model-name');
const aiApiKey = document.getElementById('ai-api-key');
const aiCheckBtn = document.getElementById('ai-check-btn');
const aiSubmitBtn = document.getElementById('ai-submit-btn');
const aiResponseDiv = document.getElementById('ai-response');

// 加载保存的配置
const savedAiConfig = JSON.parse(localStorage.getItem('aiConfig') || '{}');
if (savedAiConfig.model) {
    aiModelSelect.value = savedAiConfig.model;
    aiModelName.value = savedAiConfig.customModel || modelConfigs[savedAiConfig.model]?.defaultModel || '';
}
if (savedAiConfig.apiKey) aiApiKey.value = savedAiConfig.apiKey;

function updateModelNameInput() {
    const currentModel = aiModelSelect.value;
    const config = modelConfigs[currentModel];
    if (config && !aiModelName.value) {
        aiModelName.value = config.defaultModel;
    }
}
aiModelSelect.addEventListener('change', () => {
    const currentModel = aiModelSelect.value;
    const config = modelConfigs[currentModel];
    if (config) aiModelName.value = config.defaultModel;
    saveAiConfig();
});
aiModelName.addEventListener('input', saveAiConfig);
aiApiKey.addEventListener('input', saveAiConfig);

function saveAiConfig() {
    localStorage.setItem('aiConfig', JSON.stringify({
        model: aiModelSelect.value,
        customModel: aiModelName.value,
        apiKey: aiApiKey.value
    }));
}

// 检查连接
aiCheckBtn.addEventListener('click', async () => {
    const key = aiApiKey.value.trim();
    if (!key) { alert('请先输入 API Key'); return; }
    const model = aiModelSelect.value;
    const config = modelConfigs[model];
    if (!config) { alert('未知模型'); return; }
    const customModel = aiModelName.value.trim() || config.defaultModel;
    aiResponseDiv.textContent = '正在检查连接...';
    try {
        const response = await fetch(`${config.base}/chat/completions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
            body: JSON.stringify({
                model: customModel,
                messages: [{ role: 'user', content: 'hi' }],
                max_tokens: 5
            })
        });
        const data = await response.json();
        if (data.error) {
            aiResponseDiv.textContent = `连接失败：${data.error.message}`;
        } else {
            aiResponseDiv.textContent = '✅ API 连接成功！可以正常使用。';
        }
    } catch (err) {
        aiResponseDiv.textContent = `网络错误：${err.message}`;
    }
});

// 获取推荐
aiSubmitBtn.addEventListener('click', async () => {
    const key = aiApiKey.value.trim();
    if (!key) { alert('请先输入 API Key'); return; }
    const model = aiModelSelect.value;
    const config = modelConfigs[model];
    if (!config) { alert('未知模型'); return; }
    const customModel = aiModelName.value.trim() || config.defaultModel;

    const mood = document.getElementById('ai-mood').value.trim() || '一般';
    const appetite = document.getElementById('ai-appetite').value.trim() || '正常';
    const height = document.getElementById('ai-height').value || '170';
    const weight = document.getElementById('ai-weight').value || '65';
    const craving = document.getElementById('ai-craving').value.trim() || '无';
    const mealType = getMealName(currentMeal);
    const availableDishes = menus[currentMeal].join('、');

    const prompt = `你是一位专业营养师。请根据以下信息推荐一道适合的菜品（从可用菜品中选或建议类似健康菜品），并详细说明。
信息：
- 餐次：${mealType}
- 心情：${mood}
- 胃口：${appetite}
- 身高：${height}cm
- 体重：${weight}kg
- 特别想吃：${craving}
- 可用菜品库：${availableDishes}
输出格式（请严格按照以下格式，不要添加额外说明）：
推荐菜品：<菜品名称>
好处：<对身心/胃口的好处，50字内>
身体帮助：<营养角度，50字内>
总卡路里：<估算数值>大卡
食物特性：<温/寒/平，适宜体质等，30字内>
故事：<菜品的历史来源或趣味小故事，80字内>`;

    aiResponseDiv.textContent = '正在请求AI推荐...';
    try {
        const response = await fetch(`${config.base}/chat/completions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
            body: JSON.stringify({
                model: customModel,
                messages: [{ role: 'user', content: prompt }],
                temperature: 0.9,
                max_tokens: 500
            })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error.message);
        const text = data.choices[0].message.content;
        aiResponseDiv.textContent = text;
        const match = text.match(/推荐菜品[：:]\s*(.+)/);
        if (match) {
            const dish = match[1].trim();
            if (confirm(`AI推荐“${dish}”，要设为今天的选择吗？`)) {
                showResult(dish);
            }
        }
    } catch (err) {
        aiResponseDiv.textContent = '请求失败：' + err.message;
    }
});

// 打开/关闭 AI 面板
document.getElementById('ai-btn').addEventListener('click', ()=> document.getElementById('ai-panel').classList.add('open'));
document.getElementById('close-ai').addEventListener('click', ()=> document.getElementById('ai-panel').classList.remove('open'));

// ==================== 动画循环 ====================
let lastTime = performance.now();
function animate(now) {
    requestAnimationFrame(animate);
    const dt = Math.min((now-lastTime)/1000, 0.1); lastTime = now;
    updateKeeper(dt);
    camera.lookAt(0,1.2,0);
    renderer.render(scene, camera);
}
requestAnimationFrame(animate);
window.addEventListener('resize', ()=>{
    camera.aspect = container.clientWidth/container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>
