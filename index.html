<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action=manipulation">
    <title>现在吃什么 - 射门决定</title>
    <style>
        :root {
            --bg: #1a1a2e; --panel: #16213e; --accent: #e94560;
            --text: #eee; --btn-bg: #0f3460; --btn-active: #e94560;
        }
        body {
            margin: 0; overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #info-bar {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: rgba(22,33,62,0.85); backdrop-filter: blur(10px);
            color: var(--text); padding: 8px 16px; border-radius: 40px; font-size: 0.95rem;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15);
            flex-wrap: wrap; justify-content: center;
        }
        #meal-badge { background: var(--accent); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
        #gold-display {
            background: rgba(255,215,0,0.2); color: #ffd700; padding: 4px 10px; border-radius: 20px;
            font-weight: bold; cursor: pointer; border: 1px solid #ffd700; font-size: 0.85rem;
        }
        .info-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 0.8rem;
            display: flex; align-items: center; gap: 3px;
        }
        #sound-toggle { background: rgba(255,255,255,0.2); }
        #control-area {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 20; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        #shoot-btn {
            width: 100px; height: 100px; border-radius: 50%; background: var(--btn-bg);
            border: 4px solid rgba(255,255,255,0.5); color: white; font-size: 1.3rem;
            font-weight: bold; letter-spacing: 2px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            transition: all 0.1s; touch-action: none; position: relative;
        }
        #shoot-btn:active, #shoot-btn.pressing {
            background: var(--btn-active); border-color: #fff; transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(233,68,96,0.6);
        }
        #aim-indicator {
            color: white; font-size: 0.8rem; background: rgba(0,0,0,0.5); padding: 4px 12px;
            border-radius: 12px; min-width: 120px; text-align: center;
        }
        #result-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0);
            z-index: 100; background: rgba(22,33,62,0.95); backdrop-filter: blur(20px);
            border-radius: 24px; padding: 30px; text-align: center; color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease; min-width: 260px;
        }
        #result-modal.show { transform: translate(-50%,-50%) scale(1); }
        #result-dish { font-size: 2.2rem; font-weight: bold; margin: 10px 0; color: #ffd700; }
        .result-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
        .result-btn {
            padding: 10px 16px; border-radius: 20px; border: none; font-size: 0.9rem;
            font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .btn-confirm { background: #4caf50; color: white; }
        .btn-retry { background: #ff9800; color: white; }
        .btn-record { background: #2196F3; color: white; }
        .top-right-btns { position: fixed; top: 15px; right: 15px; z-index: 20; display: flex; gap: 8px; }
        .small-btn {
            width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3); color: white; font-size: 1.2rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        .panel {
            position: fixed; top: 0; right: -360px; width: 340px; height: 100%;
            background: var(--panel); z-index: 200; transition: right 0.3s ease;
            padding: 20px; overflow-y: auto; color: white; box-shadow: -5px 0 20px rgba(0,0,0,0.6);
        }
        .panel.open { right: 0; }
        .panel h3 { margin-top: 0; color: var(--accent); font-size: 1.2rem; }
        .close-panel { float: right; background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; }
        .input-row {
            background: rgba(255,255,255,0.05); padding: 8px; margin: 6px 0;
            border-radius: 8px; display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
        }
        .input-row label { min-width: 65px; font-size: 0.85rem; }
        .input-row input, .input-row select, .input-row textarea {
            flex: 1; min-width: 120px; padding: 6px; border-radius: 6px; border: none;
            background: rgba(255,255,255,0.15); color: white; resize: vertical;
        }
        .switch-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
        .action-btn {
            background: #ffd700; color: #000; border: none; padding: 8px 14px;
            border-radius: 20px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px;
        }
        .history-item {
            background: rgba(255,255,255,0.08); padding: 8px; border-radius: 8px; margin: 6px 0;
            font-size: 0.8rem; display: flex; justify-content: space-between;
        }
        .delete-record { cursor: pointer; color: #ff5252; }
    </style>
</head>
<body>
<div id="canvas-container"></div>

<div id="info-bar">
    <span>⚽</span>
    <span id="meal-badge">--</span>
    <span id="time-display"></span>
    <span id="gold-display" title="商店">🪙 0</span>
    <button class="info-btn" id="manual-select-btn">📋 选菜</button>
    <button class="info-btn" id="sound-toggle" title="音效开关">🔊 音效</button>
</div>

<div id="control-area">
    <div id="aim-indicator">按住滑动瞄准</div>
    <button id="shoot-btn">射 门</button>
</div>

<div class="top-right-btns">
    <button class="small-btn" id="ai-btn" title="AI推荐">🤖</button>
    <button class="small-btn" id="record-btn" title="饮食记录">📊</button>
    <button class="small-btn" id="settings-btn" title="菜单设置">☰</button>
</div>

<div id="result-modal">
    <div>🎯 今天吃这个！</div>
    <div id="result-dish"></div>
    <div class="result-buttons">
        <button class="result-btn btn-confirm" id="btn-confirm">就吃这个！</button>
        <button class="result-btn btn-record" id="btn-record">📝 记录</button>
        <button class="result-btn btn-retry" id="btn-retry">再踢一脚</button>
    </div>
</div>

<div id="manual-dropdown" style="display:none; position:fixed; top:70px; left:50%; transform:translateX(-50%); z-index:150; background:var(--panel); padding:10px; border-radius:12px;">
    <select id="dish-select" style="margin-bottom:6px; width:100%;"></select>
    <button id="confirm-manual" class="action-btn" style="width:auto;">✅ 就选这个</button>
</div>

<!-- AI 面板 -->
<div class="panel" id="ai-panel">
    <button class="close-panel" id="close-ai">✕</button>
    <h3>🤖 AI 营养顾问</h3>
    <div class="input-row"><label>模型</label><select id="ai-model-select"><option value="deepseek">DeepSeek</option><option value="kimi">Kimi</option><option value="doubao">豆包</option></select></div>
    <div class="input-row"><label>模型名</label><input id="ai-model-name" value="deepseek-chat"></div>
    <div class="input-row"><label>API Key</label><input type="password" id="ai-api-key"></div>
    <button id="ai-check-btn" class="action-btn" style="background:#4caf50; color:white;">🔍 检查连接</button>
    <div class="input-row"><label>心情</label><input id="ai-mood" placeholder="开心/疲惫..."></div>
    <div class="input-row"><label>胃口</label><input id="ai-appetite" placeholder="很好/一般"></div>
    <div class="input-row"><label>身高(cm)</label><input type="number" id="ai-height" value="170"></div>
    <div class="input-row"><label>体重(kg)</label><input type="number" id="ai-weight" value="65"></div>
    <div class="input-row"><label>特别想吃</label><input id="ai-craving" placeholder="辣的、带汤的"></div>
    <div class="input-row"><label>身体感受</label><input id="ai-body-feel" placeholder="口干、乏力、怕冷..."></div>
    <div class="switch-row"><label>🔊 AI 语音播报</label><input type="checkbox" id="ai-voice-toggle" checked></div>
    <button id="ai-submit-btn" class="action-btn">✨ 获取推荐</button>
    <div id="ai-response" style="background:rgba(255,255,255,0.1); padding:10px; border-radius:8px; margin-top:10px; max-height:200px; overflow-y:auto; white-space:pre-wrap; font-size:0.8rem;">等待输入...</div>
</div>

<!-- 记录面板 -->
<div class="panel" id="record-panel">
    <button class="close-panel" id="close-record">✕</button>
    <h3>📊 饮食记录</h3>
    <div id="history-list" style="max-height:300px; overflow-y:auto;"></div>
    <button id="analyze-diet-btn" class="action-btn">🤖 AI 评价我的饮食</button>
    <div id="diet-analysis" style="margin-top:10px; font-size:0.8rem; background:rgba(255,255,255,0.1); padding:8px; border-radius:8px;"></div>
</div>

<!-- 设置面板 -->
<div class="panel" id="settings-panel">
    <button class="close-panel" id="close-settings">✕</button>
    <h3>📋 菜单管理</h3>
    <div id="settings-content"></div>
</div>

<!-- 商店面板 -->
<div class="panel" id="shop-panel">
    <button class="close-panel" id="close-shop">✕</button>
    <h3>🛒 金币商店</h3>
    <div id="shop-content"></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.150.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// ==================== 数据管理 ====================
const DEFAULT_MENUS = {
    breakfast: ['包子','油条','豆浆','煎饼果子','牛奶麦片','三明治','鸡蛋饼','小米粥','馄饨','豆腐脑'],
    lunch: ['宫保鸡丁','鱼香肉丝','红烧牛肉面','蛋炒饭','麻辣香锅','寿司','披萨','汉堡','沙拉','鸡排饭','麻辣烫','黄焖鸡'],
    dinner: ['火锅','烤肉','牛排','意大利面','海鲜大餐','烤鱼','日式拉面','酸菜鱼','煲仔饭','水煮鱼','干锅','羊蝎子'],
    snack: ['烧烤','小龙虾','炸鸡','关东煮','炒粉','泡面','烤冷面','臭豆腐']
};

function loadMenus() {
    const saved = localStorage.getItem('nowEatMenus');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            for (const key of Object.keys(DEFAULT_MENUS)) if (!parsed[key]) parsed[key] = [...DEFAULT_MENUS[key]];
            return parsed;
        } catch(e) {}
    }
    return JSON.parse(JSON.stringify(DEFAULT_MENUS));
}
function saveMenus(m) { localStorage.setItem('nowEatMenus', JSON.stringify(m)); }
let menus = loadMenus();
saveMenus(menus);

let gameState = { gold:0, hitKeeper:0, audienceCount:0, skin:'default', scene:'default', sound:true };
const savedState = localStorage.getItem('nowEatState');
if (savedState) { try { Object.assign(gameState, JSON.parse(savedState)); } catch(e) {} }
function saveState() { localStorage.setItem('nowEatState', JSON.stringify(gameState)); }

// 餐食记录
let mealHistory = JSON.parse(localStorage.getItem('mealHistory') || '[]');
function saveHistory() { localStorage.setItem('mealHistory', JSON.stringify(mealHistory)); }

// ==================== 音效系统 ====================
const cheerPhrases = ["太棒啦！", "好球！", "吃得健康！", "完美选择～", "少吃垃圾食品哦", "这顿稳了！", "营养均衡！"];
let lastCheerTime = 0;
function playCheer() {
    if (!gameState.sound) return;
    const now = Date.now();
    if (now - lastCheerTime < 2000) return; // 防止连发
    lastCheerTime = now;
    const msg = cheerPhrases[Math.floor(Math.random() * cheerPhrases.length)];
    const utter = new SpeechSynthesisUtterance(msg);
    utter.lang = 'zh-CN'; utter.rate = 1.1; utter.pitch = 1.2;
    window.speechSynthesis.speak(utter);
}

function speakDish(dishName, mealType) {
    if (!gameState.sound) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(`今天${getMealName(mealType)}吃 ${dishName}`);
    utterance.lang = 'zh-CN'; utterance.rate = 1.0; utterance.pitch = 1.1;
    window.speechSynthesis.speak(utterance);
}

// 音效开关按钮
document.getElementById('sound-toggle').addEventListener('click', function() {
    gameState.sound = !gameState.sound;
    this.textContent = gameState.sound ? '🔊 音效' : '🔇 静音';
    saveState();
});
document.getElementById('sound-toggle').textContent = gameState.sound ? '🔊 音效' : '🔇 静音';

// ==================== 时间与餐次 ====================
function getCurrentMealType() {
    const hour = new Date().getHours();
    if (hour>=6 && hour<10) return 'breakfast';
    if (hour>=10 && hour<15) return 'lunch';
    if (hour>=17 && hour<21) return 'dinner';
    return 'snack';
}
function getMealName(type) {
    const map = { breakfast:'早餐', lunch:'午餐', dinner:'晚餐', snack:'夜宵/下午茶' };
    return map[type] || '加餐';
}

// ==================== 3D 场景初始化 (不变) ====================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
const camera = new THREE.PerspectiveCamera(50, container.clientWidth/container.clientHeight, 0.5, 100);
camera.position.set(0,4.5,14); camera.lookAt(0,1.2,0);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);
const ambient = new THREE.AmbientLight(0xffffff,0.6); scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff,0.9); sun.position.set(15,20,10); scene.add(sun);
const groundGeo = new THREE.PlaneGeometry(40,30);
const groundMat = new THREE.MeshStandardMaterial({color:0x4a8c3f, roughness:0.9});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2; ground.position.set(0,-0.01,-2); scene.add(ground);
function applyScene(type) {
    const colors = { star:0x0a0a2e, city:0x1a1a2e, default:0x87CEEB };
    scene.background = new THREE.Color(colors[type] || colors.default);
    ground.material.color.set(type==='star'?0x2a2a4e:type==='city'?0x3a3a5e:0x4a8c3f);
}
applyScene(gameState.scene);
const goalGroup = new THREE.Group();
const frameMat = new THREE.MeshStandardMaterial({color:0xffffff});
[-2,2].forEach(x => {
    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,2.5,8), frameMat);
    post.position.set(x,1.25,-5); goalGroup.add(post);
});
const crossbar = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,4,8), frameMat);
crossbar.rotation.z = Math.PI/2; crossbar.position.set(0,2.5,-5); goalGroup.add(crossbar);
scene.add(goalGroup);
const goalkeeper = new THREE.Group();
goalkeeper.add(new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.35,1.2,8), new THREE.MeshStandardMaterial({color:0xffaa00}))).position.y=0.6;
goalkeeper.add(new THREE.Mesh(new THREE.SphereGeometry(0.28,16,16), new THREE.MeshStandardMaterial({color:0xffcc88}))).position.y=1.3;
goalkeeper.position.set(0,0,-5); scene.add(goalkeeper);
const goalBaseZ = -5, goalWidth = 4, goalHeight = 2.5, keeperReach = 0.7;
const playerGroup = new THREE.Group();
playerGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.3,1.1,8), new THREE.MeshStandardMaterial({color:0x2244aa}))).position.y=0.55;
playerGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.26,16,16), new THREE.MeshStandardMaterial({color:0xffcc88}))).position.y=1.2;
playerGroup.position.set(0,0,3.5); scene.add(playerGroup);
const ballGroup = new THREE.Group(); let ballMesh;
const BALL_FACES = 20, ballRadius = 0.9;
let faceMaterials = [], faceMenus = [];
function createDishTexture(text) {
    const canvas = document.createElement('canvas'); canvas.width=128; canvas.height=128;
    const ctx = canvas.getContext('2d');
    ctx.beginPath(); ctx.arc(64,64,60,0,Math.PI*2); ctx.fillStyle='#1a1a2e'; ctx.fill();
    ctx.strokeStyle='#e94560'; ctx.lineWidth=3; ctx.stroke();
    ctx.fillStyle='white'; ctx.font='bold 22px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(text,64,64);
    return new THREE.CanvasTexture(canvas);
}
function buildBallGeometry() {
    const geo = new THREE.IcosahedronGeometry(ballRadius,0); geo.clearGroups();
    for (let i=0; i<20; i++) geo.addGroup(i*3,3,i);
    return geo;
}
function applySkin(skin) {
    if(!ballMesh) return;
    const colors = { default:0xffffff, gold:0xffd700, blue:0x4488ff };
    ballMesh.material.forEach((m,i) => {
        if(skin==='rainbow') m.color.setHSL(i/20,0.8,0.6);
        else m.color.set(colors[skin]||0xffffff);
    });
}
function updateBallTextures(dishes) {
    faceMenus=[]; faceMaterials=[];
    for(let i=0; i<20; i++) {
        const d = dishes[i%dishes.length]||'?';
        faceMenus.push(d);
        faceMaterials.push(new THREE.MeshStandardMaterial({map:createDishTexture(d), roughness:0.3}));
    }
    if(ballMesh){ ballGroup.remove(ballMesh); ballMesh.material.forEach(m=>m.map?.dispose()); ballMesh.geometry.dispose(); }
    ballMesh = new THREE.Mesh(buildBallGeometry(), faceMaterials);
    ballMesh.castShadow = true; ballGroup.add(ballMesh);
    ballGroup.position.set(0,ballRadius,3.5);
    applySkin(gameState.skin);
}
let currentMeal = getCurrentMealType();
let currentDishes = [...menus[currentMeal]];
if(currentDishes.length===0) currentDishes=['随便吃'];
updateBallTextures(currentDishes);
scene.add(ballGroup);
const aimLineGroup = new THREE.Group();
aimLineGroup.add(new THREE.Mesh(new THREE.ConeGeometry(0.15,0.5,6), new THREE.MeshBasicMaterial({color:0xff4444}))).position.z=-0.5;
aimLineGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,2,6), new THREE.MeshBasicMaterial({color:0xff4444}))).position.z=-1;
aimLineGroup.visible = false; scene.add(aimLineGroup);
const audienceGroup = new THREE.Group(); scene.add(audienceGroup);
function createAudienceMember(idx) {
    const g = new THREE.Group();
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.2,0.8,6), new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(Math.random(),0.7,0.5)}))).position.y=0.4;
    g.add(new THREE.Mesh(new THREE.SphereGeometry(0.18,8,8), new THREE.MeshStandardMaterial({color:0xffcc88}))).position.y=0.9;
    const row = Math.floor(idx/5), col = idx%5;
    g.position.set(4.5+col*1.2, 0, -3-row*1.5);
    return g;
}
function updateAudience() {
    while(audienceGroup.children.length < gameState.audienceCount) audienceGroup.add(createAudienceMember(audienceGroup.children.length));
    while(audienceGroup.children.length > gameState.audienceCount) audienceGroup.remove(audienceGroup.children[audienceGroup.children.length-1]);
}
updateAudience();

// ==================== 游戏逻辑 ====================
let isAiming=false, aimStartX=0, aimCurrentX=0, shootAngle=0, shootPower=0.5;
let isAnimating=false, keeperTimer=0, keeperTargetX=0, keeperReactionTimer=0, shotTargetX=0;
let lastResultDish = '';
function resetBall() { ballGroup.position.set(0,ballRadius,3.5); ballGroup.rotation.set(0,0,0); if(ballMesh) ballMesh.rotation.set(0,0,0); }
function showResult(dishName) {
    lastResultDish = dishName;
    document.getElementById('result-dish').textContent = dishName;
    document.getElementById('result-modal').classList.add('show');
    speakDish(dishName, currentMeal);
    playCheer();
}
function hideResult() { document.getElementById('result-modal').classList.remove('show'); }
document.getElementById('btn-confirm').addEventListener('click', ()=>{ hideResult(); resetBall(); });
document.getElementById('btn-retry').addEventListener('click', ()=>{ hideResult(); resetBall(); isAnimating=false; });
document.getElementById('btn-record').addEventListener('click', ()=>{
    if (!lastResultDish) return;
    mealHistory.push({
        dish: lastResultDish,
        meal: currentMeal,
        time: new Date().toLocaleString()
    });
    saveHistory();
    alert('已记录！');
});

function getFacingDish() {
    const camPos = camera.position.clone();
    const dir = camPos.sub(ballGroup.position.clone()).normalize();
    if(!ballMesh) return currentDishes[0];
    const geo = ballMesh.geometry, pos = geo.attributes.position, idx = geo.index;
    let bestDot=-1, bestIdx=0;
    const mat3 = new THREE.Matrix3().getNormalMatrix(ballGroup.matrixWorld);
    for(let i=0; i<geo.groups.length; i++) {
        const g = geo.groups[i];
        const v0 = new THREE.Vector3(pos.getX(idx.getX(g.start)), pos.getY(idx.getX(g.start)), pos.getZ(idx.getX(g.start)));
        const v1 = new THREE.Vector3(pos.getX(idx.getX(g.start+1)), pos.getY(idx.getX(g.start+1)), pos.getZ(idx.getX(g.start+1)));
        const v2 = new THREE.Vector3(pos.getX(idx.getX(g.start+2)), pos.getY(idx.getX(g.start+2)), pos.getZ(idx.getX(g.start+2)));
        const n = new THREE.Vector3().crossVectors(v1.clone().sub(v0), v2.clone().sub(v0)).normalize().applyMatrix3(mat3).normalize();
        const d = n.dot(dir);
        if(d>bestDot){ bestDot=d; bestIdx=i; }
    }
    return faceMenus[bestIdx] || currentDishes[0];
}

function seededSpin(seed, cb) {
    const rng = mulberry32(seed);
    const dur = 0.8+rng()*0.5, axis = new THREE.Vector3(rng()-0.5,rng()-0.5,rng()-0.5).normalize(), speed = 8+rng()*12;
    const start = performance.now();
    function spin(now) {
        const t = (now-start)/1000;
        if(t>=dur) { ballMesh.rotateOnWorldAxis(axis, speed*(dur-t+0.016)); cb(); return; }
        ballMesh.rotateOnWorldAxis(axis, speed*0.016);
        requestAnimationFrame(spin);
    }
    requestAnimationFrame(spin);
}
function mulberry32(a) {
    return function() {
        a|=0; a=a+0x6D2B79F5|0;
        let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t;
        return ((t^t>>>14)>>>0)/4294967296;
    };
}

function startShotAnimation(targetX, power) {
    isAnimating=true; hideResult();
    const startPos = ballGroup.position.clone();
    const endPos = new THREE.Vector3(targetX, 0.3+power*1.2, goalBaseZ+0.3);
    const dur = 0.7+power*0.3, startT = performance.now();
    keeperReactionTimer = 0.8; shotTargetX = targetX;
    function anim(now) {
        const el = (now-startT)/1000;
        if(el>=dur) {
            ballGroup.position.copy(endPos);
            const inX = Math.abs(endPos.x) < goalWidth/2+0.4;
            const inY = endPos.y < goalHeight+0.3 && endPos.y > -0.2;
            const saved = inX && inY && Math.hypot(endPos.x-goalkeeper.position.x, endPos.y-0.8) < keeperReach;
            if(inX && inY && !saved) {
                const finalZ = goalBaseZ-0.6;
                const extraStart = performance.now();
                function moveIn(now2) {
                    const t = Math.min((now2-extraStart)/300,1);
                    ballGroup.position.lerpVectors(endPos, new THREE.Vector3(targetX, 0.3+power*1.2, finalZ), t);
                    if(t<1) requestAnimationFrame(moveIn);
                    else {
                        const seed = Math.floor(shootAngle*1000) + Math.floor(shootPower*10000);
                        seededSpin(seed, ()=>{
                            const dish = getFacingDish();
                            showResult(dish);
                            isAnimating=false;
                        });
                    }
                }
                requestAnimationFrame(moveIn);
            } else {
                if(saved) {
                    gameState.gold += 10;
                    gameState.hitKeeper++;
                    if(gameState.hitKeeper%10===0){ gameState.audienceCount++; updateAudience(); }
                    saveState(); updateGoldDisplay();
                }
                const bounceDir = saved ? new THREE.Vector3(endPos.x-goalkeeper.position.x,0.5,1.5).normalize()
                                        : new THREE.Vector3(endPos.x>0?1:-1,0.3,1).normalize();
                const bounceEnd = endPos.clone().add(bounceDir.multiplyScalar(2));
                const bounceStart = performance.now();
                function bounce(now2) {
                    const t = Math.min((now2-bounceStart)/400,1);
                    ballGroup.position.lerpVectors(endPos, bounceEnd, t);
                    if(t<1) requestAnimationFrame(bounce);
                    else setTimeout(()=>{ resetBall(); isAnimating=false; }, 300);
                }
                requestAnimationFrame(bounce);
            }
            return;
        }
        ballGroup.position.lerpVectors(startPos, endPos, el/dur);
        requestAnimationFrame(anim);
    }
    requestAnimationFrame(anim);
}

// ==================== 动画循环 ====================
let lastTime = performance.now();
function animate(now) {
    requestAnimationFrame(animate);
    const dt = Math.min((now-lastTime)/1000,0.1); lastTime=now;
    // 守门员更新
    if(isAnimating && keeperReactionTimer>0) {
        keeperReactionTimer-=dt;
        if(keeperReactionTimer<=0) keeperTargetX = shotTargetX;
    }
    if(isAnimating && keeperReactionTimer<=0) {
        const dx = keeperTargetX - goalkeeper.position.x;
        goalkeeper.position.x += Math.sign(dx)*Math.min(Math.abs(dx), 2.2*dt);
    } else if(!isAnimating) {
        keeperTimer += dt;
        goalkeeper.position.x = Math.sin(keeperTimer*1.2)*1.8;
    }
    goalkeeper.position.x = Math.max(-goalWidth/2+0.3, Math.min(goalWidth/2-0.3, goalkeeper.position.x));
    camera.lookAt(0,1.2,0);
    renderer.render(scene, camera);
}
requestAnimationFrame(animate);
window.addEventListener('resize', ()=>{
    camera.aspect = container.clientWidth/container.clientHeight;
    camera.updateProjectionMatrix();

});
